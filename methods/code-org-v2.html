<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Load It</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    .textbox {
      font-size: 12px;
      width: 80%;
      height: 100px;
    }

    .button {
      background-color: #04aa6d;
      border: none;
      color: #fff;
      text-align: center;
      padding: 10px 20px;
      display: inline-block;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <textarea
    class="textbox"
    id="textbox"
    placeholder="Paste HTML here"
  ></textarea>

  <br>

  <!-- hidden file input -->
  <input
    type="file"
    id="fileInput"
    accept=".html,.htm"
    style="display:none;"
  >

  <button
    class="button"
    onclick="document.getElementById('fileInput').click()"
  >
    Open HTML File
  </button>

  <button
    class="button"
    id="loadButton"
    onclick="getHtml()"
  >
    Click me
  </button>

  <label>
    <input
      id="checkbox"
      type="checkbox"
      onclick="loadChunks()"
    >
    Use chunks
  </label>
       
  <script>
  
    var okmelon = `function normalizeURL(t){return"string"==typeof t?t:t instanceof URL?t.href:t&&"string"==typeof t.url?t.url:String(t||"")}!function(){const t=document.createElement,e=Element.prototype.setAttribute,o=globalThis.fetch,n=XMLHttpRequest.prototype.open,r=XMLHttpRequest.prototype.send,s=Worker,c=globalThis.SharedWorker;function l(t){const e=t.match(/^data:([^,]*?),(.*)$/);if(!e)return console.log("[DATAURL] Invalid:",t),null;const o=e[1],n=e[2],r=o.includes(";base64"),s=o.split(";")[0]||"text/plain";let c;if(r){const t=atob(n);c=new Uint8Array(t.length);for(let e=0;e<t.length;e++)c[e]=t.charCodeAt(e)}else c=(new TextEncoder).encode(decodeURIComponent(n));const l=(new TextDecoder).decode(c);return console.log("[DATAURL] Parsed:",s),{mime:s,bytes:c,text:l}}function i(t){if("string"!=typeof t||!t.startsWith("data:"))return!1;const e=l(t);return e&&((o=e.mime).includes("javascript")||o.includes("ecmascript"));var o}function a(e,o){if(console.log("[SCRIPT] Checking:",o),!i(o))return!1;const n=l(o),r=t.call(document,"script");for(const t of e.attributes)"src"!==t.name&&r.setAttribute(t.name,t.value);return r.textContent=n.text,e.parentNode&&(console.log("[SCRIPT] Inlined"),e.parentNode.replaceChild(r,e)),queueMicrotask(()=>{r.dispatchEvent(new Event("load"))}),!0}function u(t){return URL.createObjectURL(new Blob([t],{type:"text/javascript"}))}globalThis.fetch=async function(t,e){const n="string"==typeof t?t:t instanceof URL?t.href:t?.url||"";console.log("[FETCH]",n);if(normalizeURL(n).startsWith("data:")){console.log("[FETCH] Intercepted");const t=l(n);return new Response(t.bytes,{status:200,headers:{"Content-Type":t.mime}})}return o.apply(this,arguments)},XMLHttpRequest.prototype.open=function(t,e){return console.log("[XHR OPEN]",t,e),this.__dataURL="string"==typeof e&&e.startsWith("data:")?e:null,n.apply(this,arguments)},XMLHttpRequest.prototype.send=function(){if(this.__dataURL){console.log("[XHR] Intercepted");const t=l(this.__dataURL);this.readyState=4,     (function() {

      let chunkIndex = 1;
      let chunks = [];

      // stores uploaded html without rendering it
      let uploadedHtml = "";

      // file loader
      document.getElementById("fileInput").addEventListener("change", function(e) {

        const file = e.target.files[0];

        if (!file) return;

        const reader = new FileReader();

        reader.onload = function(event) {

          uploadedHtml = event.target.result;

          console.log("HTML file loaded");
        };

        reader.readAsText(file);

      });

      window.loadChunks = function() {

        const checkbox = document.getElementById("checkbox");
        const button = document.getElementById("loadButton");

        if (checkbox.checked) {

          button.textContent = "Load Chunk " + chunkIndex;

          if (!document.getElementById("addChunkButton")) {

            const addChunkButton = document.createElement("button");

            addChunkButton.textContent = "Add another chunk";
            addChunkButton.id = "addChunkButton";
            addChunkButton.className = "button";

            addChunkButton.onclick = function () {

              const textbox = document.getElementById("textbox");

              var text = uploadedHtml || textbox.value.trim();

              if (text) {

                chunks.push(text);

                text = "";

                uploadedHtml = "";

                chunkIndex++;

                button.textContent = "Load Chunk " + chunkIndex;

                textbox.value = "";
              }
            };

            document.body.appendChild(document.createElement("br"));
            document.body.appendChild(addChunkButton);
          }

        } else {

          button.textContent = "Click me";

          const existing = document.getElementById("addChunkButton");

          if (existing) existing.remove();

          chunkIndex = 1;
          chunks = [];
        }
      };

      window.getHtml = function() {

        document.querySelectorAll("body *:not(iframe)").forEach(function(el) {
          el.style.display = "none";
        });

        const iframe = document.createElement("iframe");

        iframe.style.width = '100%';
        iframe.style.height = '100%';
        iframe.style.border = 'none';

        iframe.sandbox =
          'allow-scripts allow-same-origin allow-pointer-lock allow-downloads';

        iframe.src = "/";

        document.body.appendChild(iframe);

        iframe.contentWindow.focus();

        const checkbox = document.getElementById("checkbox");
        const textbox = document.getElementById("textbox");

        if (checkbox.checked) {

          const currentText = uploadedHtml || textbox.value.trim();

          if (currentText) {

            chunks.push(currentText);

            uploadedHtml = "";

            chunkIndex++;
          }

          iframe.onload = function() {

            try {

              var doc = iframe.contentWindow.document;
              var wi = iframe.contentWindow;

              wi.eval(okmelon);

              var fullHtml = chunks.join("");

              textbox.value = "";

              doc.open();
              doc.write(fullHtml);
              doc.close();

              fullHtml = "";
              chunks = [];

            } catch (err) {

              alert("Error writing HTML: " + err.message);
            }
          };

        } else {

          iframe.onload = function() {

            var doc = iframe.contentWindow.document;
            var wi = iframe.contentWindow;

            wi.eval(okmelon);

            var inputHtml = uploadedHtml || textbox.value;
 
            try {

              doc.open();
              doc.write(inputHtml);
              doc.close();

              textbox.value = "";

              uploadedHtml = "";

              inputHtml = "";

            } catch (err) {

              alert("Error writing HTML: " + err.message);
            }
          };
        }
      };

    })();

  </script>

</body>
</html>
