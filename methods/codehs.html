<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Load It</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    .textbox {
      font-size: 12px;
      width: 80%;
      height: 100px;
    }

    .button {
      background-color: #04aa6d;
      border: none;
      color: #fff;
      text-align: center;
      padding: 10px 20px;
      display: inline-block;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <textarea
    class="textbox"
    id="textbox"
    placeholder="Paste HTML here"
  ></textarea>

  <br>

  <!-- hidden file input -->
  <input
    type="file"
    id="fileInput"
    accept=".html,.htm"
    style="display:none;"
  >

  <button
    class="button"
    onclick="document.getElementById('fileInput').click()"
  >
    Open HTML File
  </button>

  <button
    class="button"
    id="loadButton"
    onclick="getHtml()"
  >
    Click me
  </button>

  <label>
    <input
      id="checkbox"
      type="checkbox"
      onclick="loadChunks()"
    >
    Use chunks
  </label>
       
  <script>
  
   
    (function() {

      let chunkIndex = 1;
      let chunks = [];

      // stores uploaded html without rendering it
      let uploadedHtml = "";

      // file loader
      document.getElementById("fileInput").addEventListener("change", function(e) {

        const file = e.target.files[0];

        if (!file) return;

        const reader = new FileReader();

        reader.onload = function(event) {

          uploadedHtml = event.target.result;

          console.log("HTML file loaded");
        };

        reader.readAsText(file);

      });

      window.loadChunks = function() {

        const checkbox = document.getElementById("checkbox");
        const button = document.getElementById("loadButton");

        if (checkbox.checked) {

          button.textContent = "Load Chunk " + chunkIndex;

          if (!document.getElementById("addChunkButton")) {

            const addChunkButton = document.createElement("button");

            addChunkButton.textContent = "Add another chunk";
            addChunkButton.id = "addChunkButton";
            addChunkButton.className = "button";

            addChunkButton.onclick = function () {

              const textbox = document.getElementById("textbox");

              var text = uploadedHtml || textbox.value.trim();

              if (text) {

                chunks.push(text);

                text = "";

                uploadedHtml = "";

                chunkIndex++;

                button.textContent = "Load Chunk " + chunkIndex;

                textbox.value = "";
              }
            };

            document.body.appendChild(document.createElement("br"));
            document.body.appendChild(addChunkButton);
          }

        } else {

          button.textContent = "Click me";

          const existing = document.getElementById("addChunkButton");

          if (existing) existing.remove();

          chunkIndex = 1;
          chunks = [];
        }
      };

      window.getHtml = function() {

        document.querySelectorAll("body *:not(iframe)").forEach(function(el) {
          el.style.display = "none";
        });

       

      

        const checkbox = document.getElementById("checkbox");
        const textbox = document.getElementById("textbox");

        if (checkbox.checked) {

          const currentText = uploadedHtml || textbox.value.trim();

          if (currentText) {

            chunks.push(currentText);

            uploadedHtml = "";

            chunkIndex++;
          }

          

            try {

              var doc = document;
             

              //wi.eval(okmelon);

              var fullHtml = chunks.join("");

              textbox.value = "";

              doc.open();
              doc.write(fullHtml);
              doc.close();

              fullHtml = "";
              chunks = [];

            } catch (err) {

              alert("Error writing HTML: " + err.message);
            }
          

        } else {

           

            var doc = document;
           

            //wi.eval(okmelon);

            var inputHtml = uploadedHtml || textbox.value;
 
            try {

              doc.open();
              doc.write(inputHtml);
              doc.close();

              textbox.value = "";

              uploadedHtml = "";

              inputHtml = "";

            } catch (err) {

              alert("Error writing HTML: " + err.message);
            }
       
        }
      };

    })();

  </script>

</body>
</html>
