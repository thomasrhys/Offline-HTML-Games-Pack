<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Arcade</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 40px 20px; }
        h1 { color: #00ffcc; font-size: 2.5rem; margin-bottom: 5px; }
        h2 { color: #ff9900; text-align: left; max-width: 1200px; margin: 30px auto 15px auto; font-size: 1.5rem; border-bottom: 2px solid #333; padding-bottom: 5px; }
        #search-bar { width: 90%; max-width: 500px; padding: 12px 20px; margin-bottom: 20px; border-radius: 25px; border: 1px solid #333; background-color: #1e1e1e; color: #fff; font-size: 1rem; outline: none; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .game-card { background: #1e1e1e; padding: 25px 15px; border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; transition: 0.2s; border: 1px solid #333; display: flex; flex-direction: column; justify-content: center; height: 90px; box-sizing: border-box; }
        .game-card:hover { border-color: #00ffcc; color: #00ffcc; transform: translateY(-2px); }
        .play-count { font-size: 0.75rem; color: #888; margin-top: 8px; }
        #most-played-section { display: none; }
    </style>
</head>
<body>

    <h1>🕹️ Ultimate Web Arcade</h1>
    <p style="color:#a0a0a0;">Search and play 300+ offline games directly in your browser.</p>
    <input type="text" id="search-bar" placeholder="🔍 Search games..." onkeyup="filterGames()">

    <div id="most-played-section">
        <h2>🔥 Most Played</h2>
        <div class="game-grid" id="most-played-grid"></div>
    </div>

    <h2>🎮 All Games</h2>
    <div class="game-grid" id="all-games-grid"></div>

    <script>
        const rawGamesData = "1v1.lol,2048,2048cupcakes,3dflightsimulator,ageofwar,ageofwar2,agesofconflict,amongus,angrybirds,angrybirdsshowdown,angrybirdsspace,awesometanks,awsometanks2,backrooms,baconmaydie,badicecream,badicecream2,badicecream3,badparenting,badpiggies,baldisbasics,baseballbros,basketballlegends,basketballstars,basketbros,basketrandom,bitlife,bitplanes,blockysnakes,bloonsTD,bloonsTD2,bloonsTD3,bloonsTD4,bloonsTD5,bloxorz,blumgiracers,blumgirocket,bobtherobber,bobtherobber2,bobtherobber5,bouncymotors,bowmasters,boxingrandom,breakingthebank,bubbleshooter,cannon-ball,car-rush,castle-of-magic,cell-craft,chaos-faction-2,checkers,cheeseswipe,chess,chicken-merge,clashroyale,climb-over-it,cluster-rush,coingo,cookieclicker,cooking-fast,creativekillchamber,crossyroad,cube-dash,cube-field,cubito,cursor-10,cuttherope,cyber-cars-punk-racing,death-run,defend-the-tank,defendthecastle,dice-wars,diepio,digdug,doge-miner,donkeykong,doodlejump,doom,draw-the-coffee,dreadheadparkour,drift-boss-2,driftboss,drive-mad,drivemad,ducklife,ducklife2,ducklife3,ducklife4,edge-not-found,eelix,elasticface,effing-worms,egg-car,electricman2,endless-tunnel,epic-basketball,escaperoad,escaperoad2,evowarsio,extreme-car-driving,factory-balls-forever,fancypants,fancypants2,fancypants3,feudalism,fireboy-watergirl,fireboy-watergirl2,fireboy-watergirl3,fireboy-watergirl4,fireboy-watergirl5,flip-bottle,flip-runner,football-legends,free-rider-hdw,frogger,funny-shooter-2,galaga,geometry-dash,geometrydash,geometrydashlite,get-away-shootout,getawayshootout,ghenghis,going-balls,gold-miner,gunmayhem,gunmayhem2,happy-wheels,happywheels,hardest-game,hextris,hoborpg,holeio,hover-craft,idle-breakout,idle-ants,idle-digging-tycoon,impossible-quiz,impossible-quiz2,infinity-superstars,interactivebuddy,iron-snout,jelly-truck,joust,jump-and-bounce,just-one-page,kart-fight,kingdomrush,learn-to-fly,learn-to-fly-2,linerider,little-big-snake,ludo,mad-truck-challenge,mahjong,mario-kart,master-chess,maze-planet-3d,merge-cakes,merge-cyber-racers,merge-round-racers,mine-clicker,minecraft,minesweeper,minigolf,missile-command,monkey-mart,monkeymart,monopoly,monster-tracks,moto-road-rash,moto-x3m,motox3m,motoX3M2,motoX3Mspooky,motoX3Mwinter,mutilate-a-doll-2,my-pony-my-little-race,neon-biker,ov0,ovo,pacman,paper-io-2,paperio2,papas-burgeria,papas-cheeseria,papas-freezeria,papas-pizzeria,papas-scooperia,papas-taco-mia,papasfreezeria,parking-fury,penalty-shooters-2,perfect-peel,pinball,pixel-gun-apocalypse-3,plague-inc,plants-vs-zombies,plantsvszombies,pocket-league-3d,pocket-ball,pokemon-fire-red,pokemon,poly-track,pool-club,pop-it-master,poptropica,potty-racers,puzzhead,qbert,ragdollarchers,raft-wars,raft-wars-2,ramp-car-stunts,react-arkanoid,retro-bowl,retrobowl,riddle-school,riddle-school-2,riddle-school-3,riddle-school-4,riddle-school-5,road-fury,roblox,rocket-soccer-derby,rooftop-snipers,rooftopsnipers,rowdy-wrestling,run-2,run-3,run3,scrabble,shell-shockers,shellshockers,shuttle-deck,sketch-star,sky-car-stunts,slither-io,slitherio,slope-2,slope-3,slope,slope3,smash-karts,snake,snowroad,snowrider,soccer-caps,soccer-skills,soccerrandom,solitaire,sonic-advance,sonic,space-invaders,spaceiskey,speed-pool-king,spider-solitaire,stack,star-wars-racer,stick-merge,stick-war,stickman-hook,subway-surfers,subwaysurfers,sudoku,super-mario-bros,supermario,supermechs,swords-and-sandals-2,swordsandsandals2,tank-trouble,tanks,tap-road,taproad,temple-run-2,templerun2,territorywar,tetris,the-binding-of-isaac,the-heist,the-impossible-quiz,the-impossible-quiz-2,the-spear-stickman,tictactoe,timeshooter2,tombraider,tombofthemask,total-recoil,tower-crush,tunnel-rush,ultimate-car-driving,unicyclehero,uno,vector,vex-4,vex-5,vex-6,vex-7,vex7,water-ragdoll-2,we-become-what-we-behold,who-is-lying,word-search,wordle,wormate-io,worms-zone,xa-car-racing,yohoho-io,zombs-royale";

        // Full compilation of your specific .htm file exceptions
        const htmList = [
            "soccerrandom", "driftboss", "monkeymart", "bitplanes", "cookieclicker", 
            "crossyroad", "dreadheadparkour", "drivemad", "elasticface", "getawayshootout", 
            "motox3m", "paperio2", "boxingrandom",
            "ragdollarchers", "rooftopsnipers", "rooftop-snipers", "snowroad", "snowrider", 
            "templerun2", "temple-run-2", "timeshooter2", "tombofthemask"
        ];
        
        const gamesList = rawGamesData.split(',').map(name => {
            if (htmList.includes(name)) return name + ".htm";
            return name + ".html";
        });

        function formatGameName(filename) {
            let name = filename.replace('.html', '').replace('.htm', '');
            if(name === "1v1.lol") return "1v1.LOL";
            if(name.startsWith("bloons")) return name.toUpperCase().replace("TD", " TD ");
            if(name.startsWith("motox3m") || name.startsWith("moto-x3m")) return "Moto X3M";
            if(name === "paperio2" || name === "paper-io-2") return "Paper.io 2";
            if(name === "templerun2" || name === "temple-run-2") return "Temple Run 2";
            if(name === "timeshooter2") return "Time Shooter 2";
            if(name === "tombofthemask") return "Tomb of the Mask";
            return name.replace(/([A-Z])/g, ' $1').replace(/[_-]/g, ' ').trim().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function recordPlay(gameFile) {
            let stats = JSON.parse(localStorage.getItem('arcade_stats')) || {};
            stats[gameFile] = (stats[gameFile] || 0) + 1;
            localStorage.setItem('arcade_stats', JSON.stringify(stats));
        }

        function loadAllGames() {
            const grid = document.getElementById('all-games-grid');
            let stats = JSON.parse(localStorage.getItem('arcade_stats')) || {};
            grid.innerHTML = "";
            
            [...new Set(gamesList)].sort().forEach(game => {
                const count = stats[game] || 0;
                const link = document.createElement('a');
                link.className = 'game-card';
                link.href = `offline/${game}`;
                link.onclick = () => recordPlay(game);
                link.innerHTML = "<span>" + formatGameName(game) + "</span><span class='play-count'>" + count + " plays</span>";
                grid.appendChild(link);
            });
        }

        function loadMostPlayed() {
            const section = document.getElementById('most-played-section');
            const grid = document.getElementById('most-played-grid');
            grid.innerHTML = "";
            let stats = JSON.parse(localStorage.getItem('arcade_stats')) || {};
            let sortedGames = Object.keys(stats).filter(g => stats[g] > 0 && gamesList.includes(g)).sort((a, b) => stats[b] - stats[a]);

            if (sortedGames.length === 0) { section.style.display = "none"; return; }
            section.style.display = "block";
            sortedGames.slice(0, 4).forEach(game => {
                const link = document.createElement('a');
                link.className = 'game-card';
                link.href = `offline/${game}`;
                link.style.borderColor = '#ff9900';
                link.onclick = () => recordPlay(game);
                link.innerHTML = "<span>" + formatGameName(game) + "</span><span class='play-count' style='color:#ff9900;'>🔥 " + stats[game] + " plays</span>";
                grid.appendChild(link);
            });
        }

        function filterGames() {
            const input = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('#all-games-grid .game-card').forEach(card => {
                const name = card.querySelector('span').textContent.toLowerCase();
                card.style.display = name.includes(input) ? "" : "none";
            });
        }

        loadAllGames();
        loadMostPlayed();
    </script>
</body>
</html>
