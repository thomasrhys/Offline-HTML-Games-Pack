<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Arcade</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; text-align: center; margin: 0; padding: 40px 20px; }
        h1 { color: #00ffcc; font-size: 2.5rem; margin-bottom: 5px; }
        h2 { color: #ff9900; text-align: left; max-width: 1200px; margin: 30px auto 15px auto; font-size: 1.5rem; border-bottom: 2px solid #333; padding-bottom: 5px; }
        #search-bar { width: 90%; max-width: 500px; padding: 12px 20px; margin-bottom: 20px; border-radius: 25px; border: 1px solid #333; background-color: #1e1e1e; color: #fff; font-size: 1rem; outline: none; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .game-card { background: #1e1e1e; padding: 25px 15px; border-radius: 12px; text-decoration: none; color: #fff; font-weight: 600; transition: 0.2s; border: 1px solid #333; display: flex; flex-direction: column; justify-content: center; height: 90px; box-sizing: border-box; }
        .game-card:hover { border-color: #00ffcc; color: #00ffcc; transform: translateY(-2px); }
        .play-count { font-size: 0.75rem; color: #888; margin-top: 8px; }
        #most-played-section { display: none; }
    </style>
</head>
<body>

    <h1>🕹️ Ultimate Web Arcade</h1>
    <p style="color:#a0a0a0;">Search and play 300+ offline games directly in your browser.</p>
    <input type="text" id="search-bar" placeholder="🔍 Search games..." onkeyup="filterGames()">

    <div id="most-played-section">
        <h2>🔥 Most Played</h2>
        <div class="game-grid" id="most-played-grid"></div>
    </div>

    <h2>🎮 All Games</h2>
    <div class="game-grid" id="all-games-grid"></div>

    <script>
        const rawGamesData = "10minutestilldawn,1v1.lol,2048,2048cupcakes,3dflightsimulator,ageofwar,ageofwar2,agesofconflict,amongus,angrybirds,angrybirdsshowdown,angrybirdsspace,awesometanks,awsometanks2,backrooms,baconmaydie,badicecream,badicecream2,badicecream3,badparenting,badpiggies,baldisbasics,baseballbros,basketballlegends,basketballstars,basketbros,basketrandom,bitlife,bitplanes,blockysnakes,bloonsTD,bloonsTD2,bloonsTD3,bloonsTD4,bloonsTD5,bloxorz,blumgiracers,blumgirocket,bobtherobber,bobtherobber2,bobtherobber5,bouncymotors,bowmasters,boxingrandom,breakingthebank,bubbleshooter,candycrush,capybaraclicker,cardrawing,carkingarena,chess,choppyorc,circloO,circloO2,clashofvikings,cleanupio,clusterrush,cookieclicker,crazycars,crazycattle3D,crazycrashlanding,crazymotorcycle,crossyroad,cuttherope,dadish,dadish2,dadish3,deathchase,deathrun3D,demolitionderbycrashracing,doodlejump,drawclimber,dreadheadparkour,driftboss,drivemad,ducklife,ducklife2,ducklife3,ducklife4,ducklife5,ducklingsio,eagleride,earntodie,earntodie2,eggycar,elasticface,escaperoad,escaperoad2,escaperoad3,escaperoadcity2,escapingtheprison,evilglitch,fancypantsadventure,fancypantsadventure2,fireboyandwatergirl,fireboyandwatergirl2,fireboyandwatergirl3,fireboyandwatergirl4,flappybird,floodrunner2,floodrunner3,floodrunner4,fnaf,fnaf2,fnaf3,fnaf4,footballbros,footballlegends,freerider3,fruitninja,funnybattle,funnybattle2,funnymadracing,funnyshooter2,geometrydash,geometrydashlite,geometryvibes,getawayshootout,getontop,gladihoppers,googlebaseball,googledino,granny,granny2,guesstheiranswer,hanger2,happywheels,helixjump,highwayraffic,hillclimbracinglite,holeio,houseofhazards,hoverracerdrive,idlebreakout,ironsnout,jetpackjoyride,johnnytrigger,jumpingshell,karatebros,kartbros,learntofly,learntofly2,learntofly3,learntoflyidle,leveldevil,madalinstuntcars2,melonplayground,mergeroundracers,minesweeper,monkeymart,monstertracks,motox3m,motox3m2,motox3m3,motox3mpoolparty,motox3mspookyland,motox3mwinter,noobminer,ovo,ovo2,ovo3dimensions,pacman,papasbakeria,papasburgeria,papascheeseria,papascupcakeria,papasdonuteria,papasfreezeria,papashotdoggeria,papaspancakeeria,papaspastaria,papaspizzeria,papasscooperia,papastacomia,papaswingeria,paperio2,parkingfury,parkingfury2,parkingfury3,picosschool,pingpongchaos,pixelspeedrun,plantsvszombies,plonky,polytrack,poorbunny,pou,ragdollarchers,ragdollhit,ragdollsoccer,redball4vol1,redball4vol2,redball4vol3,retrobowl,retrobowlcollege,retrohighway,retropingpong,riddleschool,riddleschool2,riddleschool3,riddleschool4,riddleschool5,riddletransfer,riddletransfer2,rocketsoccerderby,rooftopsnipers,rooftopsnipers2,run,run2,run3,sandgame,shortlife,slope,slope2player,slope3,slowroads,sm63,sm64,snowballio,snowrider,snowroad,soccerbros,soccerrandom,spacebarclicker,spaceiskey,spaceiskey2,spacewaves,speedstars,sprunki,stack,stacktris,stick-merge,stateio,stickarchersbattle,stickfighter,stickmanhook,stickmerge,subwaysurfersbeijing,subwaysurfershavana,subwaysurferssanfrancisco,superbikethechampion,superhot,superliquidsoccer,superstarcar,tabletennisworldtour,tag,taproad,templeofboom,templerun2,territorallio,theimpossiblequiz,theimpossiblequiz2,thereisnog,theyarecoming,thisistheonlylevel,thisistheonlyleveltoo,timeshooter2,timeshooter3,tinyfishing,tombofthemask,trapthecat,triviacrack,tubejumpers,tunnelrush,unicyclehero,vex4,vex5,vex6,vex7,vex8,vexx3m,vexx3m2,vollyrandom,wartheknights,webecomewhatwebehold,wheeliebike,wheely,wheely2,wheely3,wheely4,wheely5,wheely6,wheely7,wheely8,wordleunlimited,worldshardestgame,worldshardestgame2,worldshardestgame3,wrestlebros,zombierush";

        // Full compilation of your specific .htm file exceptions
        const htmList = [
            "soccerrandom", "driftboss", "monkeymart", "bitplanes", "cookieclicker", 
            "crossyroad", "dreadheadparkour", "drivemad", "elasticface", "getawayshootout", 
            "motox3m", "paperio2", "boxingrandom", "dadish",
            "ragdollarchers", "rooftopsnipers", "rooftop-snipers", "snowroad", "snowrider", 
            "templerun2", "templ-run2", "timeshooter2", "tombofthemask"
        ];
        
        const gamesList = rawGamesData.split(',').map(name => {
            if (htmList.includes(name)) return name + ".htm";
            return name + ".html";
        });

        function formatGameName(filename) {
            let name = filename.replace('.html', '').replace('.htm', '');
            if(name === "1v1.lol") return "1v1.LOL";
            if(name.startsWith("bloons")) return name.toUpperCase().replace("TD", " TD ");
            if(name.startsWith("motox3m") || name.startsWith("moto-x3m")) return "Moto X3M";
            if(name === "paperio2" || name === "paper-io-2") return "Paper.io 2";
            if(name === "templerun2" || name === "temple-run-2") return "Temple Run 2";
            if(name === "timeshooter2") return "Time Shooter 2";
            if(name === "tombofthemask") return "Tomb of the Mask";
            return name.replace(/([A-Z])/g, ' $1').replace(/[_-]/g, ' ').trim().split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function recordPlay(gameFile) {
            let stats = JSON.parse(localStorage.getItem('arcade_stats')) || {};
            stats[gameFile] = (stats[gameFile] || 0) + 1;
            localStorage.setItem('arcade_stats', JSON.stringify(stats));
        }

        function loadAllGames() {
            const grid = document.getElementById('all-games-grid');
            let stats = JSON.parse(localStorage.getItem('arcade_stats')) || {};
            grid.innerHTML = "";
            
            [...new Set(gamesList)].sort().forEach(game => {
                const count = stats[game] || 0;
                const link = document.createElement('a');
                link.className = 'game-card';
                link.href = `offline/${game}`;
                link.onclick = () => recordPlay(game);
                link.innerHTML = "<span>" + formatGameName(game) + "</span><span class='play-count'>" + count + " plays</span>";
                grid.appendChild(link);
            });
        }

        function loadMostPlayed() {
            const section = document.getElementById('most-played-section');
            const grid = document.getElementById('most-played-grid');
            grid.innerHTML = "";
            let stats = JSON.parse(localStorage.getItem('arcade_stats')) || {};
            let sortedGames = Object.keys(stats).filter(g => stats[g] > 0 && gamesList.includes(g)).sort((a, b) => stats[b] - stats[a]);

            if (sortedGames.length === 0) { section.style.display = "none"; return; }
            section.style.display = "block";
            sortedGames.slice(0, 4).forEach(game => {
                const link = document.createElement('a');
                link.className = 'game-card';
                link.href = `offline/${game}`;
                link.style.borderColor = '#ff9900';
                link.onclick = () => recordPlay(game);
                link.innerHTML = "<span>" + formatGameName(game) + "</span><span class='play-count' style='color:#ff9900;'>🔥 " + stats[game] + " plays</span>";
                grid.appendChild(link);
            });
        }

        function filterGames() {
            const input = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('#all-games-grid .game-card').forEach(card => {
                const name = card.querySelector('span').textContent.toLowerCase();
                card.style.display = name.includes(input) ? "" : "none";
            });
        }

        loadAllGames();
        loadMostPlayed();
    </script>
</body>
</html>
