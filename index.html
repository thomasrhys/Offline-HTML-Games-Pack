<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThomasRhys Ultimate Offline Arcade</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            text-align: center;
            margin: 0;
            padding: 40px 20px;
        }
        h1 {
            color: #00ffcc;
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }
        h2 {
            color: #ff9900;
            text-align: left;
            max-width: 1200px;
            margin: 30px auto 15px auto;
            font-size: 1.5rem;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
        }
        .subtitle {
            color: #a0a0a0;
            margin-bottom: 30px;
        }
        #search-bar {
            width: 90%;
            max-width: 500px;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 25px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        #search-bar:focus {
            border-color: #00ffcc;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background: linear-gradient(145deg, #1e1e1e, #252525);
            padding: 25px 15px;
            border-radius: 12px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 90px;
            box-sizing: border-box;
        }
        .game-card:hover {
            transform: translateY(-3px);
            border-color: #00ffcc;
            background: #252525;
            color: #00ffcc;
        }
        .play-count {
            font-size: 0.75rem;
            color: #888;
            margin-top: 8px;
            font-weight: normal;
        }
        #most-played-section, #all-games-section {
            display: none;
        }
        .loading {
            font-size: 1.2rem;
            color: #a0a0a0;
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <h1>🕹️ Ultimate Web Arcade</h1>
    <p class="subtitle">Search and play 300+ standalone games directly in your browser.</p>

    <input type="text" id="search-bar" placeholder="🔍 Search all games..." onkeyup="filterGames()">

    <!-- Pinned Favorites -->
    <div id="most-played-section">
        <h2>🔥 Most Played</h2>
        <div class="game-grid" id="most-played-grid"></div>
    </div>

    <!-- Main Game Catalog -->
    <div id="all-games-section">
        <h2>🎮 All Games</h2>
        <div class="game-grid" id="all-games-grid"></div>
    </div>

    <div id="loading-text" class="loading">🔄 Scanning your game vault...</div>

        <script>
        // Here are your exact custom variables filled out perfectly:
        const username = "thomasrhys";
        const repoName = "Offline-HTML-Games-Pack";

        let gamesList = [];

        // Step 1: Query GitHub's API directly to read your 'offline' directory structure dynamically
        async function fetchGames() {
            try {
                const response = await fetch(`https://github.com{username}/${repoName}/contents/offline`);
                const files = await response.json();
                
                // Filter down to only files that end in .html or .htm
                gamesList = files
                    .filter(file => file.type === 'file' && (file.name.endsWith('.html') || file.name.endsWith('.htm')))
                    .map(file => file.name);

                document.getElementById('loading-text').style.display = 'none';
                document.getElementById('all-games-section').style.display = 'block';

                loadAllGames();
                loadMostPlayed();
            } catch (error) {
                document.getElementById('loading-text').textContent = "⚠️ Failed to scan repository. Please verify your folder layout.";
                console.error(error);
            }
        }

        function formatGameName(filename) {
            let name = filename.replace('.html', '').replace('.htm', '');
            
            // Fix text spacing from mashed system names (e.g. "cookieclicker" -> "Cookie Clicker")
            return name
                .replace(/([A-Z])/g, ' $1') // Insert spaces before capital letters
                .replace(/[_-]/g, ' ')       // Turn underscores or dashes into spaces
                .trim()
                .split(' ')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }

        function recordPlay(gameFile) {
            let stats = JSON.parse(localStorage.getItem('arcade_stats')) || {};
            stats[gameFile] = (stats[gameFile] || 0) + 1;
            localStorage.setItem('arcade_stats', JSON.stringify(stats));
        }

        function loadAllGames() {
            const grid = document.getElementById('all-games-grid');
            let stats = JSON.parse(localStorage.getItem('arcade_stats')) || {};
            grid.innerHTML = "";
            
            gamesList.sort().forEach(game => {
                const count = stats[game] || 0;
                const link = document.createElement('a');
                link.className = 'game-card';
                link.href = `offline/${game}`;
                link.onclick = () => recordPlay(game);
                
                link.innerHTML = `
                    <span>${formatGameName(game)}</span>
                    <span class="play-count">${count} plays</span>
                `;
                grid.appendChild(link);
            });
        }

        function loadMostPlayed() {
            const section = document.getElementById('most-played-section');
            const grid = document.getElementById('most-played-grid');
            grid.innerHTML = "";
            
            let stats = JSON.parse(localStorage.getItem('arcade_stats')) || {};
            let sortedGames = Object.keys(stats)
                .filter(game => stats[game] > 0 && gamesList.includes(game))
                .sort((a, b) => stats[b] - stats[a]);

            if (sortedGames.length === 0) {
                section.style.display = "none";
                return;
            }

            section.style.display = "block";
            sortedGames.slice(0, 4).forEach(game => {
                const link = document.createElement('a');
                link.className = 'game-card';
                link.href = `offline/${game}`;
                link.style.borderColor = '#ff9900';
                link.onclick = () => recordPlay(game);
                
                link.innerHTML = `
                    <span>${formatGameName(game)}</span>
                    <span class="play-count" style="color:#ff9900;">🔥 ${stats[game]} plays</span>
                `;
                grid.appendChild(link);
            });
        }

        function filterGames() {
            const input = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('#all-games-grid .game-card').forEach(card => {
                const name = card.querySelector('span').textContent.toLowerCase();
                card.style.display = name.includes(input) ? "" : "none";
            });
        }

        // Initialize dynamic loading on page visit
        fetchGames();
    </script>
</body>
</html>
